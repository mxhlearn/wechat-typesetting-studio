interface:
  display_name: "WeChat Article Pre"
  short_description: "Prepare Chinese WeChat articles as precise WeMD-ready Markdown."
  default_prompt: "Use $wechat-article-pre to turn Chinese WeChat public-account material into directly WeMD-formatted Markdown. Choose the article shape, preserve required facts and tutorial details, apply WeMD-supported headings, short paragraphs, lists, code blocks, links, images, tables, callouts, and diagrams only when useful, and keep the prose concise and low-AI. Default output is an article-title folder containing final-article.md plus image assets only; create review-notes.md, visual-brief.md, style-profile.md, or title option files only when explicitly requested."
