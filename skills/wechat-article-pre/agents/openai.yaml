interface:
  display_name: "WeChat Article Pre"
  short_description: "Prepare Chinese WeChat articles as composed WeMD-ready Markdown."
  default_prompt: "Use $wechat-article-pre to turn Chinese WeChat public-account material into directly WeMD-formatted Markdown. Choose the article shape, layout rhythm, and component plan from the article's job; preserve required facts, links, commands, screenshots, verification, and source constraints. Use headings, lists, code blocks, links, image notes, tables, callouts, quotes, diagrams, and references only where they clarify, prove, compare, warn, or improve reading rhythm. Keep the prose concise, rigorous, and low-AI; avoid fixed skeletons, formulaic numbered openings, repeated reassurance, and FAQ-style serious tutorials unless requested. Keep personal paths, account details, secrets, and machine-specific notes out of publishable output. Default output is an article-title folder containing final-article.md plus image assets; create sidecars only on explicit request."
